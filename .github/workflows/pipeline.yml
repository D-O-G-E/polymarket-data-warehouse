# The scheduled pipeline: ingest -> load -> transform, unattended.
#
# Watermarks come from the warehouse (--watermarks-from bigquery), not a
# local state file — runners are ephemeral, and the warehouse is the only
# durable record of what actually landed. Failed loads self-correct: the
# watermark stays behind and the next run refetches the gap.
#
# Cadence: every 6h — public repos get unlimited Actions minutes. Live
# markets retain ~15 days of hourly history, so even a multi-day outage
# loses nothing; the cadence is about freshness, not completeness.
name: pipeline

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write  # push the generated dashboard to gh-pages
    env:
      PDW_BQ_PROJECT: polymarket-dw
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install ".[warehouse]"

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Sync catalog
        run: python -m ingestion sync-catalog --volume-floor 10000 --skip-events

      - name: Harvest prices
        run: python -m ingestion harvest-prices --watermarks-from bigquery

      - name: Load to BigQuery
        run: python -m ingestion load-bigquery

      - name: dbt build
        working-directory: dbt
        run: |
          dbt deps --profiles-dir .
          dbt build --profiles-dir .

      - name: Source freshness
        working-directory: dbt
        run: dbt source freshness --profiles-dir .

      - name: Build dashboard
        run: python dashboard/build.py

      # Serves at the GitHub Pages URL once the repo is public and Pages
      # is pointed at the gh-pages branch; until then the branch just
      # quietly accumulates the latest render.
      - name: Publish dashboard
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
